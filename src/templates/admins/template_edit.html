{% extends "admins/popup_action.html" %}
{% block title %}Edit Template · {{ tool_title }}{% endblock %}

{% block popup_action_content %}
<div class="container-fluid mt-4">
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% else %}
    <div class="card">
        <div class="card-header">
            <div class="d-flex flex-wrap gap-2 justify-content-between">
                <span class="h5 mb-0">
                    Edit Template:
                </span>
                <button type="submit" form="collectDataForm" class="btn btn-warning">
                    <i class="bi bi-arrow-repeat"></i> Update
                </button>
            </div>
            <a href="https://{{ wiki_domain }}/wiki/{{ template.title }}" target="_blank">{{ template.title }}</a>
        </div>
        <div class="card-body">
            <form id="updateForm" method="post" action="{{ url_for('admin.templates.update_template') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <input type="hidden" name="id" value="{{ template.id }}" />
                <input type="hidden" name="from_popup" value="1" />

                <div class="mb-3">
                    <label for="title" class="form-label">Template Name</label>
                    <input type="text" class="form-control wiki-autocomplete" id="title" name="title"
                        value="{{ template.title }}" required />
                </div>

                <div class="mb-3">
                    <label for="main_file" class="form-label">Oldest File</label>
                    <input type="text" class="form-control" id="main_file" name="main_file"
                        value="{{ template.main_file or '' }}" />
                </div>

                <div class="mb-3">
                    <label for="last_world_file" class="form-label">Newest World File</label>
                    <input type="text" class="form-control" id="last_world_file" name="last_world_file"
                        value="{{ template.last_world_file or '' }}" />
                </div>

                <div class="mb-3">
                    <label for="last_world_year" class="form-label">Template Newest year</label>
                    <input type="number" class="form-control" id="last_world_year" name="last_world_year" min="0"
                        max="9999" step="1" value="{{ template.last_world_year or '' }}" />
                </div>

                <div class="mb-3">
                    <label for="source" class="form-label">Source</label>
                    <input type="text" class="form-control" id="source" name="source"
                        value="{{ template.source or '' }}" />
                </div>

                <div class="mb-3">
                    <label for="slug" class="form-label">Slug (Auto-Extract from source)</label>
                    <input type="text" class="form-control" id="slug" name="slug" value="{{ template.slug or '' }}" />
                </div>
            </form>

            <form id="deleteForm" method="post"
                action="{{ url_for('admin.templates.delete_template', template_id=template.id) }}" class="d-inline"
                onsubmit="return confirm('Are you sure you want to delete {{ template.title }}?');">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <input type="hidden" name="from_popup" value="1" />
            </form>

            <form id="collectDataForm" method="post"
                action="{{ url_for('admin.jobs.start_job', job_type='collect_templates_data') }}" class="d-inline"
                onsubmit="return confirm('Start collecting templates data for {{ template.title }}?');">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <input type="hidden" name="title" value="{{ template.title }}" />
            </form>

            <div class="d-flex flex-wrap gap-2 justify-content-between mt-4">
                <button type="submit" form="updateForm" class="btn btn-outline-primary">
                    <i class="bi bi-save"></i> Save Changes
                </button>
                <button type="submit" form="deleteForm" class="btn btn-outline-danger">
                    <i class="bi bi-trash"></i> Delete
                </button>
            </div>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}

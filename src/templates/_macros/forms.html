{% from "_macros.html" import csrf %}

{% macro from_cancel_job(end_point) %}
<form method="POST" action="{{ end_point }}" onsubmit="return confirm('Are you sure you want to cancel this job?');"
    class="d-inline">
    {{ csrf() }}
    <button type="submit" class="btn btn-warning">
        <i class="bi bi-x-circle"></i> Cancel
    </button>
</form>
{%- endmacro -%}

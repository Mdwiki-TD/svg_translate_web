{% extends "jobs_templates/admin_templates/base_list.html" %}

{% block header_actions %}
<form method="post" action="{{ url_for('adminpanel.jobs.start_job', job_type=job_type) }}" class="d-inline">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <input type="hidden" name="update_all" value="true" />
    <button type="submit" class="btn btn-outline-warning text-muted"
        onclick="return confirm('This will update ALL template data (including those already collected). This may take a long time. Continue?');">
        <i class="bi bi-arrow-repeat"></i> Update All
    </button>
</form>
{% endblock %}
